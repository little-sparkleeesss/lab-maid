---
# 全局配置示例
# 复制为 main.yml 并按需修改

# -------------------- 通用设置 --------------------
common_log_dir: /var/log/lab-maid
common_config_dir: /etc/lab-maid
common_retention_days_default: 30

# -------------------- ZFS 快照 --------------------
# dataset 列表在 host_vars 中填写，每项: {name: "tank/data", recursive: false}
zfs_snapshots_datasets: []
zfs_snapshots_prefix: "autosnap"
zfs_snapshots_retention_days: 30
zfs_snapshots_max_deletions: 100            # 单次最大删除数，防止配置错误导致灾难

# -------------------- SMART 监控 --------------------
smart_monitoring_drives: []                # 磁盘路径，在 host_vars 中填写
smart_monitoring_collect_interval_hours: 6
smart_monitoring_temp_warning: 50
smart_monitoring_temp_critical: 60
smart_monitoring_attr_change_alert: true

# -------------------- PostgreSQL 备份 --------------------
postgres_backups_databases: []             # 数据库名列表，在 host_vars 中填写
postgres_backups_local_dir: /var/backups/postgres
postgres_backups_retention_days: 30
postgres_backups_compression: "zstd"
postgres_backups_remote_enabled: false
postgres_backups_remote_target: ""
