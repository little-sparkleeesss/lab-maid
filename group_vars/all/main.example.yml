---
# 全局配置示例
# 复制为 main.yml 并按需修改

# -------------------- 通用设置 --------------------
common_log_dir: /var/log/lab-maid
common_config_dir: /etc/lab-maid
common_retention_days_default: 30

# -------------------- ZFS 快照 --------------------
# dataset 列表在 host_vars 中填写，每项: {name: "tank/data", recursive: false}
zfs_snapshots_datasets: []
zfs_snapshots_prefix: "autosnap"
zfs_snapshots_retention_days: 30
zfs_snapshots_max_deletions: 100            # 单次最大删除数，防止配置错误导致灾难

# -------------------- SMART 监控 --------------------
# drives 和 target 在 host_vars 中填写
smart_monitoring_drives: []
smart_monitoring_target: ""                # smartctl 执行目标（主机名）
smart_monitoring_pg_host: ""               # PostgreSQL 主机
smart_monitoring_pg_port: 5432
smart_monitoring_pg_database: "monitor"
smart_monitoring_pg_user: "monitor"
smart_monitoring_pg_password: ""           # 应来自 vault
smart_monitoring_pg_table: "smart_stats"
smart_monitoring_command_timeout: 30       # smartctl 超时秒数

# -------------------- PostgreSQL 备份 --------------------
postgres_backups_user: ""                   # PG 用户，在 host_vars 中填写
postgres_backups_password: ""               # 应来自 vault
postgres_backups_host: ""                   # 留空使用本机 Unix socket
postgres_backups_port: 5432
postgres_backups_ssl_enabled: false
postgres_backups_ssl_ca: ""
postgres_backups_local_dir: /var/backups/postgres
postgres_backups_compression_level: 19      # zstd --ultra (1-19)
postgres_backups_prefix: "pg_full_backup"
postgres_backups_retention_days: 30
postgres_backups_max_deletions: 50          # 单次最大清理数
# NAS 推送（可选）
# postgres_backups_nas_enabled: true
# postgres_backups_nas_host: ""
# postgres_backups_nas_user: ""
# postgres_backups_nas_remote_dir: ""
# postgres_backups_nas_private_key: ""
# postgres_backups_nas_host_key: ""

# -------------------- PG 物理备份前置 --------------------
pg_start_backup_host: ""                   # PG 主机
pg_start_backup_port: 5432
pg_start_backup_database: "postgres"
pg_start_backup_user: ""
pg_start_backup_password: ""               # 应来自 vault
pg_start_backup_label: "scheduled_backup"
pg_start_backup_delay_seconds: 600         # 备份窗口时长
pg_start_backup_skip_vacuum: false
