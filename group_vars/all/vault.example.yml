---
# 密钥配置示例
# 复制为 vault.yml 并用 ansible-vault encrypt 加密
#   ansible-vault encrypt group_vars/all/vault.yml

# --- Telegram 通知 ---
vault_telegram_bot_token: "123456789:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
vault_telegram_chat_id: "123456789"

# --- Email 通知 ---
vault_smtp_host: "smtp.example.com"
vault_smtp_port: 587
vault_smtp_user: "alerts@example.com"
vault_smtp_password: "your-password"
vault_notify_email: "admin@example.com"

# --- 数据库 ---
vault_postgres_passwords:
  nextcloud: "changeme"
  gitea: "changeme"
