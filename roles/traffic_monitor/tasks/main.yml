---
# 流量数据同步 — vnstat SQLite → PostgreSQL（在源主机上执行）

- name: 验证必需配置与安全性
  ansible.builtin.assert:
    that:
      - traffic_monitor_source_path | length > 0
      - traffic_monitor_pg_host | length > 0
      - traffic_monitor_pg_table is match('^[a-zA-Z_][a-zA-Z0-9_.]*$')
      - traffic_monitor_sqlite_table is match('^[a-zA-Z_][a-zA-Z0-9_]*$')
      - >-
        traffic_monitor_columns
        | reject('match', '^[a-zA-Z_][a-zA-Z0-9_]*$')
        | list | length == 0
    fail_msg: >
      pg_table / sqlite_table / columns 只能包含字母、数字和下划线

- name: 检查必要工具
  ansible.builtin.command: "{{ item }} --version"
  loop:
    - sqlite3
    - psql
  changed_when: false

- name: 获取时区偏移
  ansible.builtin.command: date +%z
  register: _tz_out
  changed_when: false

- name: 查询 PG 最后同步状态
  ansible.builtin.shell: |
    set -o pipefail
    psql \
      -h "{{ traffic_monitor_pg_host }}" \
      -p "{{ traffic_monitor_pg_port }}" \
      -U "{{ traffic_monitor_pg_user }}" \
      -d "{{ traffic_monitor_pg_database }}" \
      --no-password -t -q -c "
        SELECT
          COALESCE(MAX({{ _pk_col }}), 0),
          MAX({{ _ts_col }})
        FROM {{ traffic_monitor_pg_table }}
      "
  environment:
    PGPASSWORD: "{{ traffic_monitor_pg_password }}"
  register: _pg_state
  changed_when: false
  vars:
    _pk_col: "{{ traffic_monitor_column_mapping['id'] | default('id') }}"
    _ts_col: "{{ traffic_monitor_column_mapping['date'] | default('timestamp') }}"

- name: 计算同步参数
  ansible.builtin.set_fact:
    _max_id: "{{ _pg_state.stdout.split('|')[0] | trim | int }}"
    _last_ts: "{{ _pg_state.stdout.split('|')[1] | trim if _pg_state.stdout.split('|') | length > 1 else '' }}"

- name: 同步增量数据到 PostgreSQL
  ansible.builtin.shell: |
    set -o pipefail
    max_id={{ _max_id | default(0) }}
    last_ts='{{ _last_ts | default("") }}'
    tz_offset='{{ _tz_out.stdout | trim }}'

    # 时区 → 秒偏移 (POSIX sh 兼容)
    sign=1
    case "${tz_offset}" in -*) sign=-1 ;; esac
    # 用 awk 处理，避免 dash 八进制问题
    tz_sec=$(echo "${tz_offset}" | awk '{
      s=substr($1,1,1); v=substr($1,2)
      hr=substr(v,1,2)+0; mn=substr(v,3,2)+0
      printf "%d", (hr*3600+mn*60) * (s=="-" ? -1 : 1)
    }')

    # 增量过滤截止时间
    cutoff_epoch=0
    if [ -n "$last_ts" ] && [ "$last_ts" != "None" ]; then
      cutoff_epoch=$(date -d "$last_ts" +%s 2>/dev/null || echo 0)
    fi

    # 表有数据但无时间戳 → 跳过全量同步
    if [ "$cutoff_epoch" = "0" ] && [ "$max_id" -gt 0 ]; then
      echo "INFO: 跳过全量同步（表中已有 ${max_id} 条，无 last_ts）" >&2
      exit 0
    fi

    tmp_sql=$(mktemp)
    trap 'rm -f "$tmp_sql" "$tmp_sql.raw"' EXIT

    sqlite3 -separator '|' \
      "{{ traffic_monitor_source_path }}" \
      "SELECT {{ traffic_monitor_columns | join(', ') }}
       FROM {{ traffic_monitor_sqlite_table }}
       ORDER BY date ASC" \
      > "$tmp_sql.raw"

    while IFS='|' read -r {{ traffic_monitor_columns | join(' ') }}; do

      ts_str="${date}"
      [ -z "$ts_str" ] && continue
      row_epoch=$(date -d "$ts_str" +%s 2>/dev/null || echo 0)
      [ "$row_epoch" = "0" ] && continue

      # 增量过滤
      [ "$cutoff_epoch" -gt 0 ] && [ "$row_epoch" -le "$cutoff_epoch" ] && continue

      # 转为 UTC timestamptz
      local_epoch=$(( row_epoch - tz_sec ))
      row_ts=$(date -u -d "@${local_epoch}" '+%Y-%m-%d %H:%M:%S+00' 2>/dev/null)

      echo "INSERT INTO {{ traffic_monitor_pg_table }} ({{ _pg_non_pk_cols }})"
      echo "VALUES ({{ _value_list }})"
      echo "ON CONFLICT (timestamp) DO NOTHING;"
      count=$(( count + 1 ))
    done < "$tmp_sql.raw" > "$tmp_sql"

    if [ -s "$tmp_sql" ]; then
      psql \
        -h "{{ traffic_monitor_pg_host }}" \
        -p "{{ traffic_monitor_pg_port }}" \
        -U "{{ traffic_monitor_pg_user }}" \
        -d "{{ traffic_monitor_pg_database }}" \
        --no-password --single-transaction -q < "$tmp_sql"
    fi

    # 统计写入行数（不在 subshell 里，值正确）
    rm -f "$tmp_sql.raw"
    count=$(grep -c '^INSERT' "$tmp_sql" 2>/dev/null || echo 0)
    rm -f "$tmp_sql"
    echo "synced=${count}" >&2
  environment:
    PGPASSWORD: "{{ traffic_monitor_pg_password }}"
  register: _traffic_sync
  changed_when: "'synced=0' not in _traffic_sync.stderr"
  vars:
    _pg_non_pk_cols: >-
      {%- for col in traffic_monitor_columns if col != traffic_monitor_primary_key -%}
      {{ traffic_monitor_column_mapping[col] | default(col) }}{% if not loop.last %}, {% endif %}
      {%- endfor -%}
    _value_list: >-
      {%- for col in traffic_monitor_columns if col != traffic_monitor_primary_key -%}
      {%- if col == 'date' -%}'${row_ts}'::timestamptz
      {%- else -%}${ {{- col -}} }
      {%- endif -%}{% if not loop.last %}, {% endif %}
      {%- endfor -%}

- name: 解析同步计数
  ansible.builtin.set_fact:
    _synced_count: >-
      {{ _traffic_sync.stderr_lines
         | select('match', '^synced=')
         | map('regex_replace', 'synced=', '')
         | first | default('0') }}

- name: 打印同步摘要
  ansible.builtin.debug:
    msg:
      - "源主机时区: {{ _tz_out.stdout }}"
      - "源文件: {{ traffic_monitor_source_path }}"
      - "同步目标: {{ traffic_monitor_pg_table }}"
      - "新记录: {{ _synced_count }}"
