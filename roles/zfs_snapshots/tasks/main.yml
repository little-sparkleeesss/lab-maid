---
# ZFS 快照 — 创建与清理

- name: 验证快照前缀不为空
  ansible.builtin.assert:
    that:
      - zfs_snapshots_prefix | length > 0
    fail_msg: >
      zfs_snapshots_prefix 不能为空。
      拒绝执行以防止误删非本项目创建的快照。

- name: 获取当前时间戳
  ansible.builtin.command: date +%Y_%m_%d-%H%M%S
  register: _zfs_ts_cmd
  changed_when: false

- name: 保存快照时间戳
  ansible.builtin.set_fact:
    _zfs_snapshots_now_ts: "{{ _zfs_ts_cmd.stdout | trim }}"

- name: 创建 ZFS 快照
  ansible.builtin.command:
    cmd: >-
      zfs snapshot{% if item.recursive | default(false) %} -r{% endif %}
      {{ item.name }}@{{ zfs_snapshots_prefix }}-{{ _zfs_snapshots_now_ts }}
  loop: "{{ zfs_snapshots_datasets }}"
  register: _zfs_snapshots_create
  failed_when:
    - _zfs_snapshots_create.rc != 0
    - "'dataset already exists' not in _zfs_snapshots_create.stderr"
  changed_when: "'dataset already exists' not in _zfs_snapshots_create.stderr"

- name: 清理过期快照
  ansible.builtin.shell: |
    set -o pipefail
    cutoff_epoch=$(date -d "{{ zfs_snapshots_retention_days }} days ago" +%s)
    max_del={{ zfs_snapshots_max_deletions | default(100) }}
    prefix="{{ zfs_snapshots_prefix }}"
    total=0

    {% for ds in zfs_snapshots_datasets %}
    # --- 数据集: {{ ds.name }} ---
    flags="{% if ds.recursive | default(false) %}-r{% endif %}"
    zfs list -H -t snapshot -o name $flags "{{ ds.name }}" 2>/dev/null | while IFS= read -r snap; do
      # 解析快照名: dataset@prefix-YYYY_MM_DD-HHMMSS → 提取时间戳
      ts=$(echo "$snap" | sed -n 's/.*@'"$prefix"'-\([0-9_]\{10\}-[0-9]\{6\}\)$/\1/p')
      [ -z "$ts" ] && continue

      # 转换为 epoch: YYYY_MM_DD-HHMMSS → YYYY-MM-DD HH:MM:SS
      date_part=$(echo "$ts" | cut -d- -f1 | tr '_' '-')
      time_part=$(echo "$ts" | cut -d- -f2 | sed 's/\([0-9]\{2\}\)\([0-9]\{2\}\)\([0-9]\{2\}\)/\1:\2:\3/')
      snap_epoch=$(date -d "${date_part} ${time_part}" +%s 2>/dev/null || echo 0)

      if [ "$snap_epoch" -lt "$cutoff_epoch" ]; then
        echo "$snap"
        total=$((total + 1))
        if [ $total -gt $max_del ]; then
          echo "ERROR: 待删除快照数量超过安全上限 ($max_del)，拒绝执行" >&2
          exit 1
        fi
      fi
    done
    {% endfor %}
  args:
    executable: /bin/bash
  register: _zfs_snapshots_expired
  changed_when: _zfs_snapshots_expired.stdout_lines | length > 0

- name: 删除过期快照
  ansible.builtin.command:
    cmd: "zfs destroy {{ item }}"
  loop: "{{ _zfs_snapshots_expired.stdout_lines }}"
  when: _zfs_snapshots_expired.stdout_lines | length > 0
  changed_when: true

- name: 打印任务摘要
  ansible.builtin.debug:
    msg:
      - "创建快照: {{ _zfs_snapshots_now_ts }}"
      - "已创建 {{ _zfs_snapshots_create.results | selectattr('changed') | list | length }} 个新快照"
      - "已删除 {{ _zfs_snapshots_expired.stdout_lines | length }} 个过期快照"
