---
# PostgreSQL 备份 — pg_dumpall + 压缩（在 DB 主机本地执行）
# pg_dumpall 导出全量（所有数据库+角色+表空间）→ 管道压缩为单个文件
# 留空 host 使用 Unix socket 本地连接，填 host 则远程 TCP 连接

- name: 验证必需配置
  ansible.builtin.assert:
    that:
      - postgres_backups_user | length > 0
    fail_msg: "postgres_backups_user 必须设置"

- name: 检查 pg_dumpall 可用
  ansible.builtin.command: pg_dumpall --version
  register: _postgres_backups_pg_check
  changed_when: false
  failed_when:
    - _postgres_backups_pg_check.rc != 0
    - _postgres_backups_pg_check.rc != 1

- name: 检测可用的压缩工具
  ansible.builtin.shell: |
    if command -v zstd >/dev/null 2>&1; then echo "zstd"
    elif command -v gzip >/dev/null 2>&1; then echo "gzip"
    elif command -v xz >/dev/null 2>&1; then echo "xz"
    elif command -v pigz >/dev/null 2>&1; then echo "pigz"
    else echo "none"; fi
  register: _postgres_backups_comp_detect
  changed_when: false

- name: 确定压缩方式
  ansible.builtin.set_fact:
    _postgres_backups_comp: >-
      {{ 'none' if postgres_backups_compression == 'none'
         else postgres_backups_compression if postgres_backups_compression != 'auto'
         else _postgres_backups_comp_detect.stdout }}

- name: 确认压缩工具可用
  ansible.builtin.assert:
    that:
      - _postgres_backups_comp != 'none' or postgres_backups_compression == 'none'
    fail_msg: >
      未找到任何压缩工具 (zstd/gzip/xz/pigz)，且 compression 未设为 'none'。
      请安装任一压缩工具，或将 postgres_backups_compression 设为 'none'。

- name: 配置压缩命令与扩展名
  ansible.builtin.set_fact:
    _postgres_backups_compress_cmd: >-
      {{ 'zstd -f -v -T0 --ultra -' ~ postgres_backups_zstd_level if _postgres_backups_comp == 'zstd'
         else 'gzip -' ~ postgres_backups_gzip_level if _postgres_backups_comp == 'gzip'
         else 'pigz -' ~ postgres_backups_gzip_level if _postgres_backups_comp == 'pigz'
         else 'xz -' ~ postgres_backups_xz_level ~ ' -T0' if _postgres_backups_comp == 'xz'
         else 'cat' }}
    _postgres_backups_compress_ext: >-
      {{ '.zst' if _postgres_backups_comp == 'zstd'
         else '.gz' if _postgres_backups_comp in ['gzip', 'pigz']
         else '.xz' if _postgres_backups_comp == 'xz'
         else '' }}

- name: 确保备份目录存在
  ansible.builtin.file:
    path: "{{ postgres_backups_local_dir }}"
    state: directory
    mode: "0750"

- name: 获取当前时间戳
  ansible.builtin.command: date +%Y_%m_%d-%H%M%S
  register: _postgres_backups_ts_cmd
  changed_when: false

- name: 保存备份时间戳
  ansible.builtin.set_fact:
    _postgres_backups_ts: "{{ _postgres_backups_ts_cmd.stdout | trim }}"

- name: 生成备份文件名
  ansible.builtin.set_fact:
    _postgres_backups_file: "{{ _d ~ '/' ~ _p ~ '_' ~ _postgres_backups_ts ~ '.sql' ~ _postgres_backups_compress_ext }}"
  vars:
    _d: "{{ postgres_backups_local_dir }}"
    _p: "{{ postgres_backups_prefix }}"

- name: 执行 pg_dumpall 备份
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      pg_dumpall \
        {% if postgres_backups_host | length > 0 %}\
        -h "{{ postgres_backups_host }}" \
        -p "{{ postgres_backups_port }}" \
        {% endif %}\
        -U "{{ postgres_backups_user }}" \
        --no-password \
        | {{ _postgres_backups_compress_cmd }} \
          -o "{{ _postgres_backups_file }}"
    creates: "{{ _postgres_backups_file }}"
  environment:
    PGPASSWORD: "{{ postgres_backups_password }}"
    PGSSLMODE: "{{ 'verify-full' if postgres_backups_ssl_enabled else 'prefer' }}"
    PGSSLROOTCERT: "{{ postgres_backups_ssl_ca | default('') }}"
    PGSSLCERT: "{{ postgres_backups_ssl_cert | default('') }}"
    PGSSLKEY: "{{ postgres_backups_ssl_key | default('') }}"
  register: _postgres_backups_result

- name: 获取备份文件大小
  ansible.builtin.stat:
    path: "{{ _postgres_backups_file }}"
  register: _postgres_backups_stat

# --- NAS 推送 ---

- name: 推送备份到 NAS
  when: postgres_backups_nas_enabled | default(false)
  block:
    - name: 验证 NAS 配置完整性与安全性
      ansible.builtin.assert:
        that:
          - postgres_backups_nas_host | length > 0
          - postgres_backups_nas_user | length > 0
          - postgres_backups_nas_remote_dir | length > 0
          - postgres_backups_nas_host_key | length > 0
          - postgres_backups_nas_port is number
          - postgres_backups_nas_port | int > 0
          - postgres_backups_nas_port | int < 65536
          - postgres_backups_nas_host is match('^[a-zA-Z0-9][a-zA-Z0-9.-]+$')
        fail_msg: "NAS 推送已启用但 postgres_backups_nas_* 配置不完整或格式错误"

    - name: 配置暂存路径
      ansible.builtin.set_fact:
        _postgres_backups_nas_stage: "{{ lookup('env', 'HOME') }}/.cache/lab-maid/stage"
        _postgres_backups_nas_dst: "{{ _du }}@{{ _dh }}:{{ _dd }}/"
      vars:
        _du: "{{ postgres_backups_nas_user }}"
        _dh: "{{ postgres_backups_nas_host }}"
        _dd: "{{ postgres_backups_nas_remote_dir }}"

    - name: 创建安全的暂存目录
      ansible.builtin.file:
        path: "{{ _postgres_backups_nas_stage }}"
        state: directory
        mode: "0700"
      delegate_to: localhost
      become: false

    - name: 拉取备份到暂存目录
      ansible.builtin.fetch:
        src: "{{ _postgres_backups_file }}"
        dest: "{{ _postgres_backups_nas_stage }}/"
        flat: true

    - name: 创建 NAS 主机密钥文件
      ansible.builtin.copy:
        content: "{{ postgres_backups_nas_host_key }}\n"
        dest: "{{ _postgres_backups_nas_stage }}/known_hosts"
        mode: "0600"
      delegate_to: localhost
      become: false

    - name: 推送至 NAS
      ansible.builtin.shell: |
        set -o pipefail
        scp -q \
          -P {{ postgres_backups_nas_port | quote }}{%- if postgres_backups_nas_private_key | length > 0 %}
          -i {{ postgres_backups_nas_private_key | quote }}{%- endif %}
          -o StrictHostKeyChecking=yes \
          -o UserKnownHostsFile={{ _postgres_backups_nas_stage | quote }}/known_hosts \
          {{ _nas_file | quote }} \
          {{ _postgres_backups_nas_dst | quote }}
      vars:
        _nas_file: "{{ _postgres_backups_nas_stage }}/{{ _postgres_backups_file | basename }}"
      delegate_to: localhost
      become: false
      register: _postgres_backups_nas_push
      changed_when: true

    - name: 清理控制器暂存文件
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ _postgres_backups_nas_stage }}/{{ _postgres_backups_file | basename }}"
        - "{{ _postgres_backups_nas_stage }}/known_hosts"
      delegate_to: localhost
      become: false

    - name: 删除 DB 主机本地备份（已推送至 NAS）
      ansible.builtin.file:
        path: "{{ _postgres_backups_file }}"
        state: absent

- name: 查找过期备份文件
  ansible.builtin.find:
    paths: "{{ postgres_backups_local_dir }}"
    patterns: "{{ postgres_backups_prefix }}_*.sql*"
    age: "{{ postgres_backups_retention_days }}d"
    age_stamp: mtime
    file_type: file
  register: _postgres_backups_expired
  changed_when: false
  when: not (postgres_backups_nas_enabled | default(false))
  # 如果已推送到 NAS，本地文件已被删除，无需清理

- name: 检查过期备份数量安全性
  ansible.builtin.assert:
    that:
      - _postgres_backups_expired.files | length <= postgres_backups_max_deletions
    fail_msg: >
      待删除备份数量 ({{ _postgres_backups_expired.files | length }})
      超过安全上限 ({{ postgres_backups_max_deletions }})，拒绝执行。
      请检查 retention_days 或手动清理。
  when:
    - not (postgres_backups_nas_enabled | default(false))
    - _postgres_backups_expired.files | length > 0

- name: 删除过期备份
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _postgres_backups_expired.files }}"
  when:
    - not (postgres_backups_nas_enabled | default(false))
    - _postgres_backups_expired.files | length > 0

- name: 打印备份摘要
  ansible.builtin.debug:
    msg:
      - "备份文件: {{ _postgres_backups_file }}"
      - "备份大小: {{ (_postgres_backups_stat.stat.size | default(0) | int / 1048576) | round(1) }} MiB"
      - >-
        {{ '已推送至 NAS: ' ~ postgres_backups_nas_host
           if (postgres_backups_nas_enabled | default(false))
           else '已删除 ' ~ (_postgres_backups_expired.files | default([]) | length) ~ ' 个过期备份' }}
