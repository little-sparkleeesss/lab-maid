---
# PostgreSQL 备份 — pg_dumpall + zstd 压缩（在控制器上执行）
# 架构匹配原始 Python：pg_dumpall 通过网络连远程 PG，管道在控制器本地压缩

- name: 验证必需配置
  ansible.builtin.assert:
    that:
      - postgres_backups_user | length > 0
      - postgres_backups_host | length > 0
    fail_msg: "postgres_backups_user / host 必须设置"

- name: 检查 pg_dumpall 可用
  ansible.builtin.command: pg_dumpall --version
  register: _pg_dumpall_check
  changed_when: false
  failed_when:
    - _pg_dumpall_check.rc != 0
    - _pg_dumpall_check.rc != 1

- name: 检测可用的压缩工具
  ansible.builtin.shell: |
    if command -v zstd >/dev/null 2>&1; then echo "zstd"
    elif command -v gzip >/dev/null 2>&1; then echo "gzip"
    elif command -v xz >/dev/null 2>&1; then echo "xz"
    elif command -v pigz >/dev/null 2>&1; then echo "pigz"
    else echo "none"; fi
  register: _compressor_detect
  changed_when: false

- name: 确定压缩方式
  ansible.builtin.set_fact:
    _compressor: >-
      {{ 'none' if postgres_backups_compression == 'none'
         else postgres_backups_compression if postgres_backups_compression != 'auto'
         else _compressor_detect.stdout }}

- name: 确认压缩工具可用
  ansible.builtin.assert:
    that:
      - _compressor != 'none' or postgres_backups_compression == 'none'
    fail_msg: >
      未找到任何压缩工具 (zstd/gzip/xz/pigz)，且 compression 未设为 'none'。
      请安装任一压缩工具，或将 postgres_backups_compression 设为 'none'。

- name: 配置压缩命令与扩展名
  ansible.builtin.set_fact:
    _compress_cmd: >-
      {{ 'zstd -v -T0 --ultra -' ~ postgres_backups_zstd_level if _compressor == 'zstd'
         else 'gzip -' ~ postgres_backups_gzip_level if _compressor == 'gzip'
         else 'pigz -' ~ postgres_backups_gzip_level if _compressor == 'pigz'
         else 'xz -' ~ postgres_backups_xz_level ~ ' -T0' if _compressor == 'xz'
         else 'cat' }}
    _compress_ext: >-
      {{ '.zst' if _compressor == 'zstd'
         else '.gz' if _compressor in ['gzip', 'pigz']
         else '.xz' if _compressor == 'xz'
         else '' }}

- name: 确保备份目录存在
  ansible.builtin.file:
    path: "{{ postgres_backups_local_dir }}"
    state: directory
    mode: "0750"

- name: 生成备份时间戳
  ansible.builtin.set_fact:
    _pg_backup_ts: "{{ _d ~ '_' ~ _t }}"
  vars:
    _d: "{{ ansible_date_time.date | replace('-', '') }}"
    _t: "{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}{{ ansible_date_time.second }}"

- name: 生成备份文件名
  ansible.builtin.set_fact:
    _pg_backup_file: "{{ _dir ~ '/' ~ _pfx ~ '_' ~ _pg_backup_ts ~ '.sql' ~ _compress_ext }}"
  vars:
    _dir: "{{ postgres_backups_local_dir }}"
    _pfx: "{{ postgres_backups_prefix }}"

- name: 执行 pg_dumpall 备份
  ansible.builtin.shell: |
    set -o pipefail
    pg_dumpall \
      -h "{{ postgres_backups_host }}" \
      -p "{{ postgres_backups_port }}" \
      -U "{{ postgres_backups_user }}" \
      --no-password \
      | {{ _compress_cmd }} \
        -o "{{ _pg_backup_file }}"
  environment:
    PGPASSWORD: "{{ postgres_backups_password }}"
    PGSSLMODE: "{{ 'verify-full' if postgres_backups_ssl_enabled else 'prefer' }}"
    PGSSLROOTCERT: "{{ postgres_backups_ssl_ca | default('') }}"
    PGSSLCERT: "{{ postgres_backups_ssl_cert | default('') }}"
    PGSSLKEY: "{{ postgres_backups_ssl_key | default('') }}"
  register: _pg_backup_result
  changed_when: true

- name: 获取备份文件大小
  ansible.builtin.stat:
    path: "{{ _pg_backup_file }}"
  register: _pg_backup_stat

# --- NAS 推送 ---

- name: 推送备份到 NAS
  when: postgres_backups_nas_enabled | default(false)
  block:
    - name: 验证 NAS 配置完整性与安全性
      ansible.builtin.assert:
        that:
          - postgres_backups_nas_host | length > 0
          - postgres_backups_nas_user | length > 0
          - postgres_backups_nas_remote_dir | length > 0
          - postgres_backups_nas_host_key | length > 0
          - postgres_backups_nas_port is number
          - postgres_backups_nas_port | int > 0
          - postgres_backups_nas_port | int < 65536
          - postgres_backups_nas_host is match('^[a-zA-Z0-9][a-zA-Z0-9.-]+$')
        fail_msg: "NAS 推送已启用但 postgres_backups_nas_* 配置不完整或格式错误"

    - name: 创建 NAS 主机密钥文件
      ansible.builtin.copy:
        content: "{{ postgres_backups_nas_host_key }}\n"
        dest: /tmp/pg_nas_known_hosts
        mode: "0600"

    - name: 构建 NAS 推送参数
      ansible.builtin.set_fact:
        _nas_ssh: >-
          ssh
          -p {{ postgres_backups_nas_port }}{%- if postgres_backups_nas_private_key | length > 0 %}
          -i {{ postgres_backups_nas_private_key }}{% endif %}
          -o StrictHostKeyChecking=yes
          -o UserKnownHostsFile=/tmp/pg_nas_known_hosts
        _nas_dst: "{{ _u }}@{{ _h }}:{{ _d }}/"
      vars:
        _u: "{{ postgres_backups_nas_user }}"
        _h: "{{ postgres_backups_nas_host }}"
        _d: "{{ postgres_backups_nas_remote_dir }}"

    - name: 推送至 NAS
      ansible.builtin.shell: |
        set -o pipefail
        rsync -azP \
          -e {{ _nas_ssh | quote }} \
          {{ _pg_backup_file | quote }} \
          {{ _nas_dst | quote }}
      register: _pg_nas_push
      changed_when: true

    - name: 清理 NAS 密钥文件
      ansible.builtin.file:
        path: /tmp/pg_nas_known_hosts
        state: absent

    - name: 删除本地备份（已推送至 NAS）
      ansible.builtin.file:
        path: "{{ _pg_backup_file }}"
        state: absent

- name: 查找过期备份文件
  ansible.builtin.find:
    paths: "{{ postgres_backups_local_dir }}"
    patterns: "{{ postgres_backups_prefix }}_*.sql*"
    age: "{{ postgres_backups_retention_days }}d"
    age_stamp: mtime
    file_type: file
  register: _pg_expired_files
  changed_when: false
  when: not (postgres_backups_nas_enabled | default(false))
  # 如果已推送到 NAS，本地文件已被删除，无需清理

- name: 检查过期备份数量安全性
  ansible.builtin.assert:
    that:
      - _pg_expired_files.files | length <= postgres_backups_max_deletions
    fail_msg: >
      待删除备份数量 ({{ _pg_expired_files.files | length }})
      超过安全上限 ({{ postgres_backups_max_deletions }})，拒绝执行。
      请检查 retention_days 或手动清理。
  when:
    - not (postgres_backups_nas_enabled | default(false))
    - _pg_expired_files.files | length > 0

- name: 删除过期备份
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _pg_expired_files.files }}"
  when:
    - not (postgres_backups_nas_enabled | default(false))
    - _pg_expired_files.files | length > 0

- name: 打印备份摘要
  ansible.builtin.debug:
    msg:
      - "备份文件: {{ _pg_backup_file }}"
      - "备份大小: {{ (_pg_backup_stat.stat.size | default(0) | int / 1048576) | round(1) }} MiB"
      - >-
        {{ '已推送至 NAS: ' ~ postgres_backups_nas_host
           if (postgres_backups_nas_enabled | default(false))
           else '已删除 ' ~ (_pg_expired_files.files | default([]) | length) ~ ' 个过期备份' }}
